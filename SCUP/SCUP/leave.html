<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Leave - AITAM SCUP</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar dynamically loaded -->
    <div id="sidebarContainer"></div>

    <main class="main-content">
      <div class="top-header">
        <div class="page-title-section">
          <h1>Leave Application Form</h1>
          <p>Submit a digital leave request to your department head or faculty advisor.</p>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-8 mx-auto">
          <div class="glass-card shadow-lg">
            <div class="d-flex align-items-center mb-4 pb-2 border-bottom">
              <div class="stat-icon-wrapper me-3 mb-0">
                <i class="bi bi-calendar2-range"></i>
              </div>
              <div>
                <h4 class="fw-extrabold mb-1">Request Leave</h4>
                <p class="text-muted mb-0">Fields will automatically align with your active session.</p>
              </div>
            </div>

            <form id="leaveForm">
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group-custom">
                    <label for="rollno" class="form-label-custom">Roll No / Student ID</label>
                    <input type="text" class="form-input-custom" id="rollno" readonly>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group-custom">
                    <label for="department" class="form-label-custom">Department</label>
                    <input type="text" class="form-input-custom" id="department" readonly>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6">
                  <div class="form-group-custom">
                    <label for="fromDate" class="form-label-custom">From Date</label>
                    <input type="date" class="form-input-custom" id="fromDate" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group-custom">
                    <label for="toDate" class="form-label-custom">To Date</label>
                    <input type="date" class="form-input-custom" id="toDate" required>
                  </div>
                </div>
              </div>

              <div class="form-group-custom d-none" id="durationAlert">
                <div class="alert alert-info py-2 px-3 m-0 d-flex justify-content-between align-items-center">
                  <span><i class="bi bi-info-circle me-2"></i>Calculated duration:</span>
                  <strong class="fs-6" id="leaveDays">0 days</strong>
                </div>
              </div>

              <div class="form-group-custom">
                <label for="reason" class="form-label-custom">Reason for Leave</label>
                <textarea class="form-input-custom" id="reason" rows="4" placeholder="Describe the reason for leave in detail..." required></textarea>
              </div>

              <div class="d-flex gap-3 justify-content-end mt-4">
                <a href="dashboard.html" class="btn btn-secondary-custom px-4">Cancel</a>
                <button type="submit" class="btn btn-premium px-5">Submit Request</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Success Toast Modal -->
  <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card p-4 text-center border">
        <div class="stat-icon-wrapper mx-auto mb-3" style="--accent-color: var(--success-color); width: 65px; height: 65px; font-size: 2rem;">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h4 class="fw-extrabold text-success mb-2">Request Submitted!</h4>
        <p class="text-secondary mb-4" id="successModalMsg">Your leave request is sent and is pending review.</p>
        <button type="button" class="btn btn-premium w-100" data-bs-dismiss="modal" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="JS/app.js"></script>
  <!-- Page JS -->
  <script src="JS/leave.js"></script>
</body>
</html>
