<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AITAM SCUP</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="glass-card login-card shadow-lg">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center mb-3">
          <div class="brand-logo-icon me-2">
            <i class="bi bi-rocket-takeoff-fill"></i>
          </div>
          <span class="brand-logo fs-3">SCUP</span>
        </div>
        <h4 class="fw-extrabold mb-1">AITAM Portal Login</h4>
        <p class="text-muted">Smart Campus Utility Portal</p>
      </div>

      <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
        <div class="form-group-custom">
          <label class="form-label-custom" for="userName">Full Name</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-person"></i></span>
            <input type="text" class="form-input-custom border-start-0 ps-0" id="userName" placeholder="Enter your full name" required>
          </div>
        </div>

        <div class="form-group-custom">
          <label class="form-label-custom" id="idLabel" for="userId">Roll No</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-card-text"></i></span>
            <input type="text" class="form-input-custom border-start-0 ps-0" id="userId" placeholder="Enter your Roll No (e.g. 23A51A12B5)" required>
          </div>
        </div>

        <div class="form-group-custom">
          <label class="form-label-custom" for="userDept">Department</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-building"></i></span>
            <input type="text" class="form-input-custom border-start-0 ps-0" id="userDept" placeholder="Enter your Department (e.g. IT, CSE)" required>
          </div>
        </div>

        <div class="form-group-custom">
          <label class="form-label-custom" for="userRole">Select Role</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-person-badge"></i></span>
            <select class="form-input-custom border-start-0 ps-0" id="userRole" onchange="adjustRoleFields()" required>
              <option value="Student">Student</option>
              <option value="Faculty">Faculty</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-premium w-100 py-3 mt-2">
          Sign In <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="JS/login.js"></script>
</body>
</html>
