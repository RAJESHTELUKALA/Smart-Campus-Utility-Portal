<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Portal - AITAM SCUP</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar dynamically loaded -->
    <div id="sidebarContainer"></div>

    <main class="main-content">
      <div class="top-header">
        <div class="page-title-section">
          <h1>Campus Event Portal</h1>
          <p>Discover and register for academic and extra-curricular events happening at AITAM.</p>
        </div>
        <div class="header-actions">
          <!-- Only shown for Faculty/Admin -->
          <button id="addEventBtn" class="btn btn-premium d-none" data-bs-toggle="modal" data-bs-target="#addEventModal">
            <i class="bi bi-calendar-plus-fill me-2"></i>Create Event
          </button>
        </div>
      </div>

      <!-- Tabs and Filter Row -->
      <div class="glass-card mb-4 py-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
          <ul class="nav nav-pills" id="eventTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active fw-bold text-sm px-4 py-2" id="all-events-tab" data-bs-toggle="pill" onclick="switchTab('all')" type="button">All Events</button>
            </li>
            <li class="nav-item" id="myEventsTabItem" role="presentation">
              <button class="nav-link fw-bold text-sm px-4 py-2" id="my-events-tab" data-bs-toggle="pill" onclick="switchTab('mine')" type="button">Registered (My Events)</button>
            </li>
          </ul>
          <span class="badge-custom resolved py-2 px-3 fw-bold" id="eventCountBadge">3 Events Available</span>
        </div>
      </div>

      <!-- Events List -->
      <div id="eventList" class="row g-4">
        <!-- Rendered dynamically -->
      </div>
    </main>
  </div>

  <!-- Create Event Modal (Faculty/Admin only) -->
  <div class="modal fade" id="addEventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card p-4 border">
        <div class="modal-header border-0 pb-0">
          <h4 class="fw-extrabold mb-0"><i class="bi bi-calendar-event text-primary me-2"></i>Create New Event</h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-4">
          <form id="addEventForm">
            <div class="form-group-custom">
              <label for="eventTitle" class="form-label-custom">Event Title</label>
              <input type="text" class="form-input-custom" id="eventTitle" placeholder="e.g. Workshop on Angular" required>
            </div>
            
            <div class="row">
              <div class="col-md-6">
                <div class="form-group-custom">
                  <label for="eventDate" class="form-label-custom">Event Date</label>
                  <input type="date" class="form-input-custom" id="eventDate" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group-custom">
                  <label for="eventLocation" class="form-label-custom">Location</label>
                  <input type="text" class="form-input-custom" id="eventLocation" placeholder="e.g. Lab 4 Ground Floor" required>
                </div>
              </div>
            </div>

            <div class="form-group-custom">
              <label for="eventDesc" class="form-label-custom">Short Description</label>
              <textarea class="form-input-custom" id="eventDesc" rows="3" placeholder="Briefly describe what this event is about..." required></textarea>
            </div>

            <div class="modal-footer border-0 pt-3 px-0 pb-0">
              <button type="button" class="btn btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-premium">Publish Event</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="JS/app.js"></script>
  <!-- Page JS -->
  <script src="JS/event.js"></script>
</body>
</html>
