<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raise Maintenance - AITAM SCUP</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar dynamically loaded -->
    <div id="sidebarContainer"></div>

    <main class="main-content">
      <div class="top-header">
        <div class="page-title-section">
          <h1>Maintenance Complaint Form</h1>
          <p>Report facilities, electrical, internet, or other maintenance issues on campus.</p>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-8 mx-auto">
          <div class="glass-card shadow-lg">
            <div class="d-flex align-items-center mb-4 pb-2 border-bottom">
              <div class="stat-icon-wrapper me-3 mb-0" style="--accent-color: var(--warning-color);">
                <i class="bi bi-wrench-adjustable"></i>
              </div>
              <div>
                <h4 class="fw-extrabold mb-1">Report a Problem</h4>
                <p class="text-muted mb-0">Our campus technicians will be notified immediately.</p>
              </div>
            </div>

            <form id="maintenanceForm">
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group-custom">
                    <label for="rollno" class="form-label-custom">Roll No / Employee ID</label>
                    <input type="text" class="form-input-custom" id="rollno" readonly>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group-custom">
                    <label for="issueType" class="form-label-custom">Issue Category</label>
                    <select class="form-input-custom" id="issueType" required>
                      <option value="">Select Category</option>
                      <option value="Electrical">⚡ Electrical (Fan, Light, Switch)</option>
                      <option value="Plumbing">🚰 Plumbing (Tap, Leakage, Drainage)</option>
                      <option value="Furniture">🪑 Furniture (Bench, Chair, Board)</option>
                      <option value="Internet">🌐 Internet / Wi-Fi Connection</option>
                      <option value="Other">🛠️ Other Facility Issue</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="form-group-custom">
                <label for="location" class="form-label-custom">Location / Room Number</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-geo-alt"></i></span>
                  <input type="text" class="form-input-custom border-start-0 ps-0" id="location" placeholder="e.g. Hostel Block B, Room 202 or Lab 3" required>
                </div>
              </div>

              <div class="form-group-custom">
                <label for="description" class="form-label-custom">Problem Description</label>
                <textarea class="form-input-custom" id="description" rows="4" placeholder="Please describe the issue in detail so the technician knows what to bring..." required></textarea>
              </div>

              <div class="d-flex gap-3 justify-content-end mt-4">
                <a href="dashboard.html" class="btn btn-secondary-custom px-4">Cancel</a>
                <button type="submit" class="btn btn-premium px-5" style="background: linear-gradient(135deg, var(--warning-color), #d97706); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);">Submit Complaint</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Success Toast Modal -->
  <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card p-4 text-center border">
        <div class="stat-icon-wrapper mx-auto mb-3" style="--accent-color: var(--success-color); width: 65px; height: 65px; font-size: 2rem;">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h4 class="fw-extrabold text-success mb-2">Complaint Logged!</h4>
        <p class="text-secondary mb-4" id="successModalMsg">Our maintenance team has received your ticket.</p>
        <button type="button" class="btn btn-premium w-100" data-bs-dismiss="modal" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="JS/app.js"></script>
  <!-- Page JS -->
  <script src="JS/maintenance.js"></script>
</body>
</html>
